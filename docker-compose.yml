version: "3.9"

services:
  ms-ali-akbar-betest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-ali-akbar-betest
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/db_ali_akbar_betest
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_NAME: redis_ali_akbar_betest
      REDIS_TTL: 3600
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: db_ali_akbar_betest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: redis_ali_akbar_betest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  app-network:
    driver: bridge
